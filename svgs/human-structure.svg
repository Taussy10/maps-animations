<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 150" width="100%" height="100%">
  <defs>
    <!-- White Glow Filter -->
    <filter id="white-glow" x="-50%" y="-50%" width="200%" height="200%">
      <!-- Blur the shape -->
      <feGaussianBlur stdDeviation="6" result="blur" />
      <!-- Boost the intensity of the blur and make it white -->
      <feComponentTransfer in="blur" result="brightBlur">
        <feFuncA type="linear" slope="2"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="brightBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Group with glow filter applied, fill set to white -->
  <g filter="url(#white-glow)" fill="#FFFFFF">
    <!-- Head -->
    <circle cx="50" cy="20" r="11" />
    
    <!-- Torso -->
    <rect x="38" y="37" width="24" height="52" rx="12" />
    
    <!-- Left Arm -->
    <rect x="24" y="37" width="10" height="42" rx="5" />
    
    <!-- Right Arm -->
    <rect x="66" y="37" width="10" height="42" rx="5" />
    
    <!-- Left Leg -->
    <rect x="38" y="95" width="10" height="45" rx="5" />
    
    <!-- Right Leg -->
    <rect x="52" y="95" width="10" height="45" rx="5" />
  </g>
</svg>
