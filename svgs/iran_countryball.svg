<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <!-- Clip path for the circular body -->
    <clipPath id="circleClip">
      <circle cx="200" cy="200" r="180" />
    </clipPath>
    
    <!-- Radial gradient for 3D sphere shading -->
    <radialGradient id="sphereShadow" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4" />
      <stop offset="60%" stop-color="#000000" stop-opacity="0" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.6" />
    </radialGradient>
  </defs>

  <!-- Countryball body with the embedded flag -->
  <g clip-path="url(#circleClip)">
    <!-- Flag image spanning the whole circle -->
    <image href="https://upload.wikimedia.org/wikipedia/commons/c/ca/Flag_of_Iran.svg" 
           x="20" y="20" width="360" height="360" 
           preserveAspectRatio="xMidYMid slice" />
  </g>

  <!-- Outline and 3D shading -->
  <circle cx="200" cy="200" r="180" fill="url(#sphereShadow)" stroke="#222222" stroke-width="12" />

  <!-- Eyes (Classic Countryball Style) -->
  <g id="eyes">
    <!-- Left Eye (white background, black border) -->
    <path d="M 100 150 C 130 140, 160 160, 160 190 C 160 210, 140 225, 110 220 C 80 215, 80 160, 100 150 Z" 
          fill="#ffffff" stroke="#222222" stroke-width="6" stroke-linejoin="round" />
    
    <!-- Right Eye -->
    <path d="M 300 150 C 270 140, 240 160, 240 190 C 240 210, 260 225, 290 220 C 320 215, 320 160, 300 150 Z" 
          fill="#ffffff" stroke="#222222" stroke-width="6" stroke-linejoin="round" />
  </g>
</svg>
